<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXE011 - Mídias em HTML5</title>
</head>
<body>
    <h1>Imagens Dinâmicas</h1>
    <p>Em HTML5, é possível exibir diferentes imagens de acordo com o tamanho da tela ou outras condições.</p>
    <!-- Basta inserir a seguinte estrutura: -->
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <!-- Quando a tela for menor que 750px, a imagem exibida será a foto-p.png.-->
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <!-- Quando a tela for menor que 1050px, a imagem exibida será a foto-m.png.-->
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Também é possível reproduzir áudios em HTML5 em diferentes formatos compatíveis com diferentes navegadores.</p>
    <!-- Basta inserir a seguinte estrutura: -->
    <audio preload="metadata" autoplay controls loop>
    <!-- o atributo preload="metadata" carrega apenas os metadados do áudio, como sua duração. Deixando o site mais rápido. -->
        <source src="midia/happy-mistake.mp3" type="audio/mpeg">
        <!-- Se o navegador suportart arquivos mpeg, ele irá reproduzir o primeiro audio. -->
        <source src="midia/happy-mistake.ogg" type="audio/ogg">
        <!-- Caso contrário, ele tentará reproduzir o arquivo OGG e depois o WAV.-->
        <source src="midia/happy-mistake.wav" type="audio/wav">
        <p>Caso o áudio não seja reproduzido, <a href="midia/happy-mistake.mp3" download="happy-mistake.mp3" type="audio/mpeg">você pode baixar o arquivo MP3.</a></p>
    </audio>
</body>
</html>
